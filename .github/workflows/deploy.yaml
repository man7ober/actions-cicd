name: 'Deploy to AWS'

on:
  # manual trigger
  workflow_dispatch:

  # push trigger
  push:
    branches:
      - master

jobs:
  # Docker build and push
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Dockerfile
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest .

      - name: Deploy to Docker Hub
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest

  # Terraform Provisioning
  provision:
    needs: build

    env:
      AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID}}'
      AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY}}'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      ec2_ip: ${{ steps.tf-output.outputs.ec2_ip }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: tf-output
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # Deploy to AWS
  deploy:
    needs: provision

    runs-on: ubuntu-latest

    steps:
      - name: Wait for SSH
        run: sleep 60

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.provision.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest

            docker stop node-farming || true
            docker rm node-farming || true

            docker run -d \
              --name node-farming \
              --restart unless-stopped \
              -p 80:8000 \
              ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest
