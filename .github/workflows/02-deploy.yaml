name: 'Deploy to AWS'

on:
  # manual trigger
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Dockerfile
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/node-farming .

      - name: Deploy to Docker Hub
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/node-farming

  aws-deploy:
    needs: docker-build

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest

            docker stop node-farming || true
            docker rm node-farming || true

            docker run -d \
              --name node-farming \
              --restart unless-stopped \
              -p 80:8000 \
              ${{ vars.DOCKERHUB_USERNAME }}/node-farming:latest
